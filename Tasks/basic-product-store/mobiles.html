<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobiles - Product Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">prod-store</a>
        </div>
        <div class="nav-center">
            <a href="mobiles.html" class="nav-link">Mobiles</a>
            <a href="laptops.html" class="nav-link">Laptops</a>
            <a href="watches.html" class="nav-link">Watches</a>
        </div>
        <div class="nav-right">
            <a href="cart.html" class="nav-link cart-link">
                Cart <span id="cart-count" class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <!-- Products Grid -->
    <div class="container">
        <h2 class="page-title">Mobiles</h2>
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image"><img src="https://www.apple.com/in/iphone-17-pro/images/overview/highlights/highlights_design_endframe__flnga0hibmeu_large.jpg" alt="iPhone 17"></div>
                <div class="product-info">
                    <div class="product-name">iPhone 17</div>
                    <div class="product-category">Mobiles</div>
                    <div class="product-price">$999</div>
                    <button class="add-to-cart-btn" onclick="addItem('m1', 'iPhone 17', 'Mobiles', 999)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"><img src="https://img.global.news.samsung.com/global/wp-content/uploads/2026/02/26031538/Samsung-Mobile-Galaxy-Unpacked-2026-Galaxy-S26-Series-Launch_main1.jpg" alt="Samsung S24"></div>
                <div class="product-info">
                    <div class="product-name">Samsung S24</div>
                    <div class="product-category">Mobiles</div>
                    <div class="product-price">$899</div>
                    <button class="add-to-cart-btn" onclick="addItem('m2', 'Samsung S24', 'Mobiles', 899)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"><img src="#" alt="Google Pixel 8"></div>
                <div class="product-info">
                    <div class="product-name">Google Pixel 8</div>
                    <div class="product-category">Mobiles</div>
                    <div class="product-price">$799</div>
                    <button class="add-to-cart-btn" onclick="addItem('m3', 'Google Pixel 8', 'Mobiles', 799)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"><img src="#" alt="OnePlus 12"></div>
                <div class="product-info">
                    <div class="product-name">OnePlus 12</div>
                    <div class="product-category">Mobiles</div>
                    <div class="product-price">$699</div>
                    <button class="add-to-cart-btn" onclick="addItem('m4', 'OnePlus 12', 'Mobiles', 699)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"><img src="#" alt="Xiaomi 14"></div>
                <div class="product-info">
                    <div class="product-name">Xiaomi 14</div>
                    <div class="product-category">Mobiles</div>
                    <div class="product-price">$599</div>
                    <button class="add-to-cart-btn" onclick="addItem('m5', 'Xiaomi 14', 'Mobiles', 599)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"><img src="#" alt="Poco X6"></div>
                <div class="product-info">
                    <div class="product-name">Poco X6</div>
                    <div class="product-category">Mobiles</div>
                    <div class="product-price">$499</div>
                    <button class="add-to-cart-btn" onclick="addItem('m6', 'Poco X6', 'Mobiles', 499)">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
