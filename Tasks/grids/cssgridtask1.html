<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            .parent{
                height: 90vh;
                background-color: rgb(39, 73, 5);
                border: 2px solid rgb(219, 0, 0);
                padding: 10px;
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }

            .child{
                background-color: limegreen;
                margin: 5px;
                border: 1px solid white;
            }

            .c1{
                grid-column-start: 1;
                grid-column-end: 13;
            }

            .c2{
                grid-column-start: 1;
                grid-column-end: 7;
            }
            .c3{
                grid-column-start: 7;
                grid-column-end: 13;
            }
            .c4{
                grid-column-start: 1;
                grid-column-end: 5;
            }
            .c5{
                grid-column-start: 5;
                grid-column-end: 9;
            }
            .c6{
                grid-column-start: 9;
                grid-column-end: 13;
            }
            .c7{
                grid-column-start: 1;
                grid-column-end: 4;
            }
            .c8{
                grid-column-start: 4;
                grid-column-end: 7;
            }
            .c9{
                grid-column-start: 7;
                grid-column-end: 10;
            }
            .c10{
                grid-column-start: 10;
                grid-column-end: 13;
            }
            .c11{
                grid-column-start: 1;
                grid-column-end: 3;
            }
            .c12{
                grid-column-start: 3;
                grid-column-end: 5;
            }
            .c13{
                grid-column-start: 5;
                grid-column-end: 7;
            }
            .c14{
                grid-column-start: 7;
                grid-column-end: 9;
            }
            .c15{
                grid-column-start: 9;
                grid-column-end: 11;
            }
            .c16{
                grid-column-start: 11;
                grid-column-end: 13;
            }

        </style>
    </head>
    <body>
        <div class="parent">
            <div class="child c1">1</div>
            <div class="child c2">2</div>
            <div class="child c3">3</div>
            <div class="child c4">4</div>
            <div class="child c5">5</div>
            <div class="child c6">6</div>
            <div class="child c7">7</div>
            <div class="child c8">8</div>
            <div class="child c9">9</div>
            <div class="child c10">10</div>
            <div class="child c11">11</div>
            <div class="child c12">12</div>
            <div class="child c13">13</div>
            <div class="child c14">14</div>
            <div class="child c15">15</div>
            <div class="child c16">16</div>
            <div class="child c17">17</div>
            <div class="child c18">18</div>
            <div class="child c19">19</div>
            <div class="child c20">20</div>
            <div class="child c21">21</div>
            <div class="child c22">22</div>
            <div class="child c23">23</div>
            <div class="child c24">24</div>
            <div class="child c25">25</div>
            <div class="child c26">26</div>
            <div class="child c27">27</div>
            <div class="child c28">28</div>
        </div>
    </body>
</html>
