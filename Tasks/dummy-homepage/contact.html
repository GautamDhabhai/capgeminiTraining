<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Contact us</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <style>
           
            /* body{
                background-color: rgba(0,0,0,0.7);
                display: flex;

                height: 100vh;
                justify-content: center;

             body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-image: url("whale.jpg");
                background-repeat: no-repeat;
                background-size: cover;
                display: flex;
                align-items: center;
                height: 100vh;
                justify-content: center;
                color: rgb(184, 180, 176);
            }
            .contact-box {
                background: rgba(0,0,0,0.7);
                padding: 25px;
                width: 320px;
                border-radius: 15px;

                display: flex;
                flex-direction: column;
                align-items: center;     
                justify-content: space-between;
                height: 40vh;
            }

            .contact-box h2 {
                text-align: center;
            }

            .contact-box input {
                width: 100%;
                padding: 8px;
                background: none;
                border-radius: 10px;
                border: 1px solid orange;
                color: white;
            }

            .contact-box textarea {
                width: 100%;
                padding: 8px;
                background: none;
                border-radius: 10px;
                border: 1px solid orange;
                color: white;
                resize: none;        /* prevents manual resizing */
                height: 80px;
                margin: 3px;
            }

            .contact-box button {
                width: 100%;
                padding: 8px;
                background: orange;
                border: none;
                cursor: pointer;
                border-radius: 10px;
            }

            
        </style>
    </head>
    <body>
        
        <div class="contact-box">
            <h2 class="contact-header">Contact us</h2>
            <input type="text" placeholder="Enter Name Here" class="name">
            <input type="email" placeholder="Enter Email Here" class="email">
            <textarea name="" id=""></textarea>
            <button class="login-button">Send</button>
            
        </div>
    </body>
</html>
